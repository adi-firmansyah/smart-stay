[pytest]
# Pytest configuration untuk Smart Stay backend testing

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers untuk organize tests
markers =
    auth: Tests untuk authentication
    residents: Tests untuk resident management
    embeddings: Tests untuk face embeddings
    integration: Integration tests
    slow: Tests yang berjalan lambat

# Test paths
testpaths = tests

# Minimum code coverage
# Uncomment untuk enforce coverage
# addopts = --cov=src --cov-report=html --cov-report=term-missing --cov-fail-under=70
